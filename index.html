<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Projeto FIAP - Slides Carrefour</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #05080d;
    }

    body {
      background: #05080d;
      font-family: Arial, sans-serif;
    }

    .slides {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 32px 0;
    }

    .slide {
      width: min(100vw, 1920px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    @media (max-width: 768px) {
      .slides {
        gap: 12px;
        padding: 12px 0;
      }
    }
  </style>
</head>

<body>

  <main class="slides">

    <section class="slide" id="slide-1">
      <img src="slide-1.png" alt="Slide 1">
    </section>

    <section class="slide" id="slide-2">
      <img src="slide-2.png" alt="Slide 2">
    </section>

    <section class="slide" id="slide-3">
      <img src="slide-3.png" alt="Slide 3">
    </section>

    <section class="slide" id="slide-4">
      <img src="slide-4.png" alt="Slide 4">
    </section>

    <section class="slide" id="slide-5">
      <img src="slide-5.png" alt="Slide 5">
    </section>

    <section class="slide" id="slide-6">
      <img src="slide-6.png" alt="Slide 6">
    </section>

    <section class="slide" id="slide-7">
      <img src="slide-7.png" alt="Slide 7">
    </section>

    <section class="slide" id="slide-8">
      <img src="slide-8.png" alt="Slide 8">
    </section>

    <section class="slide" id="slide-9">
      <img src="slide-9.png" alt="Slide 9">
    </section>

  </main>

</body>
</html>
